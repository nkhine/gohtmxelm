root = "."
tmp_dir = ".air"

[build]
cmd = "make build BINARY=.air/gohtmxelm-demo"
bin = ".air/gohtmxelm-demo"
full_bin = "sh -c 'PORT=${PORT:-8091} exec ./.air/gohtmxelm-demo'"
delay = 700
include_ext = ["go", "templ", "elm", "js", "mod", "sum"]
exclude_dir = [
  ".git",
  ".air",
  "demo/elm-stuff",
  "demo/static/vendor",
]
exclude_file = [
  "gohtmxelm-demo",
  "demo/static/elm.js",
  "demo/internal/ui/page_templ.go",
  "demo/internal/ui/components/message_templ.go",
  "demo/internal/ui/components/stopwatch_templ.go",
  "demo/internal/ui/components/fragments_templ.go",
]
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[screen]
clear_on_rebuild = false
keep_scroll = true
